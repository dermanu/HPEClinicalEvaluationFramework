program: skeletonMorphing/trainFinalSkeletonMorphing.py
name: skeleton-morphing-final
command:
  - python
  - -m
  - skeletonMorphing.trainFinalSkeletonMorphing
method: grid
parameters:
  learning_rate:
    value: [0.00005]
  BATCH_SIZE:
    value: [64]
  weight_decay:
    value: [0.001]
  N_epochs:
    value: [80]
  layer_size:
    value: [2048]
  train_pars:
    value: [6, 7, 8, 9, 10, 16, 17, 18, 20, 21, 22, 24, 25]
  test_pars:
    value: [5, 26]
  model_type:
    value: mediapipe
  n_samples:
    value: [25]
  dropout_rate:
    value: [0.2]
early_terminate:
  type: hyperband
  min_iter: 5
  eta: 4
